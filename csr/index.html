<!DOCTYPE html>
<html>
<head>
    <title>CSR Generator</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 500px;
            margin: 40px auto;
        }
        input {
            width: 100%;
            margin: 5px 0;
            padding: 8px;
        }
        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            cursor: pointer;
        }
        #copyBtn {
            background: #4CAF50;
            color: white;
            border: none;
        }
         #homeBtn {
            background: #4CAF50;
            color: white;
            border: none;
        }
        #status {
            margin-top: 10px;
            color: green;
        }
        pre {
            background: linear-gradient(135deg, #000000 0%, #4CAF50 100%);
            padding: 10px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h2>CSR Generator</h2>

<input id="domain" placeholder="Domain (e.g. muuna.lv)">
<input id="org" placeholder="Organization (e.g. ANGERN, SIA)">
<input id="city" placeholder="City (e.g. Riga)">
<input id="state" placeholder="State (e.g. Riga)">
<input id="country" placeholder="Country (2-letter, e.g. LV)">

<button onclick="generate()">Generate</button>
<button id="copyBtn" onclick="copyToClipboard()">Copy to Clipboard</button>
<button id="homeBtn" <a href="https://stonekat.id.lv/index.php" class="home-btn button">🏠 Back</button>

<pre id="output"></pre>
<div id="status"></div>

<script>
function generate() {
    const domain = document.getElementById("domain").value.trim();
    const org = document.getElementById("org").value.trim();
    const city = document.getElementById("city").value.trim();
    const state = document.getElementById("state").value.trim();
    const country = document.getElementById("country").value.trim();

    if (!domain || !org || !city || !state || !country) {
        document.getElementById("output").textContent = "Please fill all fields.";
        return;
    }

    const csrName = domain.replaceAll('*', 'star').replaceAll('.', '_');

    // Optional: escape commas in org
    //const safeOrg = org.replace(/,/g, "\\,");

    const cmd = `openssl req -new -newkey rsa:2048 -nodes \
-out ${csrName}.csr \
-keyout ${csrName}.key \
-subj "/C=${country}/ST=${state}/L=${city}/O=${org}/CN=${domain}"`;

    document.getElementById("output").textContent = cmd;
    document.getElementById("status").textContent = "";
}

function copyToClipboard() {
    const text = document.getElementById("output").textContent;

    if (!text) return;

    navigator.clipboard.writeText(text).then(() => {
        document.getElementById("status").textContent = "Copied to clipboard!";
    }).catch(() => {
        document.getElementById("status").textContent = "Copy failed.";
    });
}
</script>

</body>
</html>
