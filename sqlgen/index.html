<!DOCTYPE html>

    <title>SQL Database Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #020003 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        
        .inputs-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 600px) {
            .inputs-section {
                grid-template-columns: 1fr;
            }
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .config-section {
            margin-bottom: 20px;
        }
        
        .config-section h2 {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        
        .config-output {
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #333;
            overflow-x: auto;
            min-height: 200px;
            white-space: pre;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        button,
        a.button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .copy-btn {
            background: #667eea;
            color: white;
            flex: 1;
            min-width: 150px;
        }
        
        .copy-btn:hover {
            background: #5568d3;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }
        
        .copy-btn:active {
            transform: translateY(0);
        }
        
        .reset-btn {
            background: #f0f0f0;
            color: #333;
            flex: 1;
            min-width: 150px;
            border: 2px solid #e0e0e0;
        }
        
        .reset-btn:hover {
            background: #e0e0e0;
            border-color: #333;
        }
        
        .home-btn {
            background: #764ba2;
            color: white;
            text-decoration: none;
            flex: 1;
            min-width: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .home-btn:hover {
            background: #664fa1;
            box-shadow: 0 8px 20px rgba(118, 75, 162, 0.3);
            transform: translateY(-2px);
        }
        
        .home-btn:active {
            transform: translateY(0);
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .toast.show {
            display: block;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>

var _eid_promises = {}; 
// Turn the incoming message from extension 
// into pending Promise resolving 
window.addEventListener("message", function(event) { 
    if(event.source !== window) return; 
    if(event.data.src && (event.data.src === "eparaksts-background.js")) { 
        console.log("Page received: "); 
        console.log(event.data); 
        // Get the promise 
        if(event.data.nonce) { 
            var p = _eid_promises[event.data.nonce]; 
            // resolve 
            if(p !== undefined) { 
                if(event.data.result === "ok") { 
                    if(event.data.signature !== undefined) { 
                        p.resolve({hex: event.data.signature}); 
                    } else if(event.data.version !== undefined && event.data.extension !== undefined) { 
                        p.resolve(event.data.version + "/js" + event.data.extension); 
                    } else if(event.data.cert !== undefined) { 
                        p.resolve({hex: event.data.cert}); 
                    } else { 
                        console.log("No idea how to handle message"); 
                        console.log(event.data); 
                    } 
                } else { 
                    // reject 
                    p.reject(new Error(event.data.result)); 
                } 
            } else { 
            	console.log("Undefined promise"); 
            } 
            delete _eid_promises[event.data.nonce]; 
        } else { 
            console.log("No nonce in event msg"); 
        } 
    } 
}, false); 
 
 
function eParakstsTokenSigning() { 
    function nonce() { 
        var val = ""; 
        var hex = "abcdefghijklmnopqrstuvwxyz0123456789"; 
        for(var i = 0; i < 16; i++) val += hex.charAt(Math.floor(Math.random() * hex.length)); 
        return val; 
    } 
 
    function messagePromise(msg) { 
        return new Promise(function(resolve, reject) { 
            // amend with necessary metadata 
            msg["nonce"] = nonce(); 
            msg["src"] = "eparaksts-page.js"; 
            // send message 
            window.postMessage(msg, "*"); 
            // and store promise callbacks 
            _eid_promises[msg.nonce] = { 
                resolve: resolve, 
                reject: reject 
            }; 
        }); 
    } 
    this.getCertificate = function(options) { 
        var msg = {type: "CERT", lang: options.lang, operation: options.operation}; 
        console.log("getCertificate()"); 
        return messagePromise(msg); 
    }; 
    this.sign = function(cert, hash, options) { 
        var msg = {type: "SIGN", cert: cert.hex, hash: hash.hex, hashtype: hash.type, lang: options.lang, operation: options.operation}; 
        console.log("sign()"); 
        return messagePromise(msg); 
    }; 
    this.getVersion = function() { 
        console.log("getVersion()"); 
        return messagePromise({ 
            type: "VERSION" 
        }); 
    }; 
}

<body>
    <div class="container">
        <h1>🗄️ SQL Database Generator</h1>
        
        <div class="inputs-section">
            <div class="input-group">
                <label for="name">Database Name</label>
                <input type="text" id="name" placeholder="dbuser">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="your_password_here">
            </div>
        </div>
        
        <div class="config-section">
            <h2>Generated SQL Commands</h2>
            <div class="config-output" id="configOutput">create database c_NAME;
CREATE USER 'NAME'@'%' IDENTIFIED BY 'PASSWORD';
GRANT ALL PRIVILEGES ON c_NAME.* TO 'NAME'@'%';
flush privileges;</div>
        </div>
        
        <div class="button-group">
            <button class="copy-btn" onclick="copyToClipboard()">📋 Copy to Clipboard</button>
            <button class="reset-btn" onclick="resetForm()">🔄 Reset</button>
            <a href="https://mareks.lv/index.php" class="home-btn button">🏠 Exit</a>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        const nameInput = document.getElementById('name');
        const passwordInput = document.getElementById('password');
        const configOutput = document.getElementById('configOutput');
        const toast = document.getElementById('toast');
        
        const templateConfig = `create database c_NAME character set utf8mb4;
CREATE USER 'NAME'@'%' IDENTIFIED BY 'PASSWORD';
GRANT ALL PRIVILEGES ON c_NAME.* TO 'NAME'@'%';
flush privileges;`;
        
        function updateConfig() {
            let config = templateConfig;
            const name = nameInput.value || 'NAME';
            const password = passwordInput.value || 'PASSWORD';
            
            config = config.replace(/NAME/g, name);
            config = config.replace(/PASSWORD/g, password);
            
            configOutput.textContent = config;
        }
        
        function copyToClipboard() {
            const text = configOutput.textContent;
            navigator.clipboard.writeText(text).then(() => {
                showToast('✓ Copied to clipboard!');
            }).catch(() => {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('✓ Copied to clipboard!');
            });
        }
        
        function resetForm() {
            nameInput.value = '';
            passwordInput.value = '';
            updateConfig();
        }
        
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        nameInput.addEventListener('input', updateConfig);
        passwordInput.addEventListener('input', updateConfig);
    </script>


</body></html>
